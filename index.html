<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>

  <body>
    <!-- ─── HEADER: theme toggle + custom name ─── -->
    <header id="header">
      <button id="theme-toggle" aria-label="Toggle light/dark mode">☀️</button>

      <div id="name-form">
        <label for="name-input">Your name:</label>
        <input
          type="text"
          id="name-input"
          placeholder="Enter your name…"
          aria-label="Your display name"
        />
        <button id="name-save">Save</button>
        <button id="name-clear">Clear</button>
      </div>
    </header>

    <!-- ─── GREETING: live date/time + greeting text ─── -->
    <section id="greeting">
      <h1 id="greeting-text">Good Morning!</h1>
      <p id="datetime-text">Loading…</p>
    </section>

    <!-- ─── MAIN GRID: timer (left) + to-do (right) ─── -->
    <main class="dashboard-grid">

      <!-- Focus Timer -->
      <section id="timer">
        <h2>⏱ Focus Timer</h2>
        <div id="timer-duration-form">
          <label for="timer-duration">Duration (minutes):</label>
          <input
            type="number"
            id="timer-duration"
            value="25"
            min="1"
            max="180"
            aria-label="Timer duration in minutes"
          />
        </div>
        <div id="timer-display">25:00</div>
        <div id="timer-controls">
          <button id="timer-start">Start</button>
          <button id="timer-reset">Reset</button>
        </div>
      </section>

      <!-- To-Do List -->
      <section id="todo">
        <h2>✅ To-Do List</h2>
        <div id="todo-form">
          <label for="todo-input" class="visually-hidden">New task</label>
          <input
            type="text"
            id="todo-input"
            placeholder="Add a task…"
            aria-label="New task"
          />
          <button id="todo-add">Add</button>
        </div>
        <!-- Warning shown when user tries to add a duplicate task -->
        <p id="todo-warning" hidden aria-live="polite">
          ⚠️ That task already exists!
        </p>
        <ul id="todo-list"></ul>
      </section>

    </main>

    <!-- ─── QUICK LINKS ─── -->
    <section id="links">
      <h2>🔗 Quick Links</h2>
      <div id="link-form">
        <label for="link-url" class="visually-hidden">URL</label>
        <input
          type="url"
          id="link-url"
          placeholder="https://…"
          aria-label="Website URL"
        />
        <label for="link-label" class="visually-hidden">Label</label>
        <input
          type="text"
          id="link-label"
          placeholder="Label (optional)"
          aria-label="Link label"
        />
        <button id="link-add">Save Link</button>
      </div>
      <div id="link-list"></div>
    </section>

  </body>
</html>
